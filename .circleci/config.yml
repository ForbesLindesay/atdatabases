version: 2

refs:
  - &container
    docker:
      - image: node:24
        environment:
          PG_URL: 'postgres://test-user@localhost:5432/test-db'
          MYSQL_URL: 'mysql://test-user:password@localhost:3306/test-db'
      - image: postgres:10.6-alpine
        environment:
          POSTGRES_USER: test-user
          POSTGRES_DB: test-db
      - image: mysql:8.0.23
        environment:
          MYSQL_USER: test-user
          MYSQL_PASSWORD: password
          MYSQL_DATABASE: test-db
          MYSQL_ALLOW_EMPTY_PASSWORD: 'true'
    working_directory: ~/repo
  - &restore_cache
    restore_cache:
      keys:
        - v1-dependencies-{{ checksum "package-lock.json" }}
        - v1-dependencies-
  - &save_cache
    save_cache:
      paths:
        - node_modules
      key: v1-dependencies-{{ checksum "package-lock.json" }}
  - &npm_auth
    run:
      name: NPM Auth
      command: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
  - &npm_install
    run:
      name: Install Dependencies
      command: npm install
  - &build
    run:
      name: Build
      command: node --run build
  - &test
    run:
      name: Test
      command: node --run test -- --maxWorkers 2
  - &prettier
    run:
      name: Prettier (check prettier:write has been run)
      command: node --run prettier:check

jobs:
  all:
    <<: *container
    steps:
      - checkout
      - *restore_cache
      - *npm_auth
      - *npm_install
      - *save_cache
      - *prettier
      - *build
      - *test

workflows:
  version: 2
  all:
    jobs:
      - all
 
  nightly:
    triggers:
      - schedule:
          cron: '0 1 * * *'
          filters:
            branches:
              only: master
    jobs:
      - all:
          context: common-env
